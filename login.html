<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEU Library Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="overlay">
      <h1>📚 NEU Library</h1>
      <p>Explore knowledge. Learn smarter.</p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="form-box">

      <div class="top-text">
        <a href="register.html">Sign Up</a>
      </div>

      <h2>Welcome Back</h2>

      <!-- FLOATING INPUT -->
      <div class="input-group">
        <input type="email" id="email" required>
        <label>Email Address</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" required>
        <label>Password</label>
      </div>

      <!-- EXTRA OPTIONS -->
      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot?</a>
      </div>

      <button id="loginBtn">Sign In</button>

    </div>
  </div>

</div>

<script type="module" src="login.js"></script>
</body>
</html>
